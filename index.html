<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Apex | AI Study Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#04040d;--surface:#0b0b18;--surface2:#111122;--surface3:#181830;
  --border:rgba(120,80,255,.12);--border2:rgba(120,80,255,.25);
  --p:#7c3aed;--p2:#a855f7;--p3:#c084fc;
  --cyan:#06b6d4;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--pink:#ec4899;
  --text:#f1f5f9;--muted:#8892a4;--muted2:#4a5568;
  --glow:0 0 40px rgba(124,58,237,.35);
  --r:14px;--r2:20px;--r3:28px;
}
[data-theme=light]{
  --bg:#f5f5ff;--surface:#fff;--surface2:#eeeeff;--surface3:#e5e5f8;
  --border:rgba(100,60,200,.15);--border2:rgba(100,60,200,.3);
  --text:#12063b;--muted:#5c6bc0;--muted2:#9fa8da;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--p);border-radius:2px}
/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pop{0%{transform:scale(.85);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
@keyframes pulse-glow{0%,100%{box-shadow:var(--glow)}50%{box-shadow:0 0 70px rgba(168,85,247,.5)}}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
@keyframes stream{0%,100%{opacity:1}50%{opacity:0}}
@keyframes confetti{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes badgePop{0%{transform:scale(0) rotate(-15deg)}70%{transform:scale(1.2) rotate(3deg)}100%{transform:scale(1) rotate(0)}}
@keyframes xpFill{from{width:0}}
@keyframes orbFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-30px) rotate(180deg)}}
@keyframes bgPulse{0%{opacity:.4}50%{opacity:.7}100%{opacity:.4}}

/* PAGE SYSTEM */
.page{display:none;animation:fadeIn .35s ease}
.page.active{display:block}

/* ═══ LANDING PAGE ═══ */
#landingPage{position:relative;min-height:100vh}
.land-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:bgPulse 6s ease-in-out infinite}
.orb1{width:600px;height:600px;background:rgba(124,58,237,.18);top:-200px;right:-200px;animation-delay:0s}
.orb2{width:500px;height:500px;background:rgba(6,182,212,.12);bottom:-100px;left:-150px;animation-delay:2s}
.orb3{width:400px;height:400px;background:rgba(236,72,153,.08);top:40%;left:40%;animation-delay:4s}

/* NAV */
.land-nav{position:fixed;top:0;z-index:100;width:100%;padding:0 60px;height:68px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px);border-bottom:1px solid var(--border);background:rgba(4,4,13,.7);transition:all .3s}
[data-theme=light] .land-nav{background:rgba(245,245,255,.85)}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none}
.brand-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--p),var(--cyan));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 16px rgba(124,58,237,.4)}
.brand-name{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,var(--p3),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.land-nav ul{display:flex;gap:28px;list-style:none}
.land-nav ul a{font-size:.87rem;font-weight:500;color:var(--muted);text-decoration:none;cursor:pointer;transition:color .2s}
.land-nav ul a:hover{color:var(--text)}
.nav-ctas{display:flex;gap:10px;align-items:center}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 22px;border:none;border-radius:50px;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .22s;white-space:nowrap;font-family:'Inter',sans-serif;position:relative;overflow:hidden}
.btn:active{transform:scale(.97)}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:.2s}
.btn:hover::after{background:rgba(255,255,255,.07)}
.btn-ghost{background:transparent;border:1.5px solid var(--border2);color:var(--text);padding:10px 20px}
.btn-ghost:hover{border-color:var(--p);color:var(--p2)}
.btn-primary{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;box-shadow:0 6px 24px rgba(124,58,237,.35)}
.btn-primary:hover{box-shadow:0 10px 36px rgba(124,58,237,.55);transform:translateY(-1px)}
.btn-glow{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;font-size:1rem;padding:16px 40px;border-radius:60px;box-shadow:0 8px 32px rgba(124,58,237,.5);animation:pulse-glow 3s infinite}
.btn-glow:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 16px 48px rgba(124,58,237,.7)}
.btn-outline-white{background:transparent;border:2px solid rgba(255,255,255,.35);color:#fff;padding:15px 38px;font-size:1rem;border-radius:60px}
.btn-outline-white:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.7)}
.btn-cyan{background:linear-gradient(135deg,#0891b2,var(--cyan));color:#fff;box-shadow:0 6px 24px rgba(6,182,212,.3)}
.btn-success{background:linear-gradient(135deg,#059669,var(--green));color:#fff;box-shadow:0 6px 20px rgba(16,185,129,.3)}
.btn-danger{background:linear-gradient(135deg,#dc2626,var(--red));color:#fff}
.btn-secondary{background:var(--surface2);color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:hover{border-color:var(--p)}
.btn-sm{padding:9px 18px;font-size:.8rem;border-radius:50px}
.btn-xs{padding:7px 14px;font-size:.75rem;border-radius:50px}
.btn-full{width:100%}
.btn-icon{width:40px;height:40px;padding:0;border-radius:12px;font-size:1rem}

/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:120px 60px 80px;text-align:center;position:relative;z-index:1;flex-direction:column}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);border-radius:50px;font-size:.8rem;font-weight:700;color:var(--p3);margin-bottom:30px;animation:slideUp .6s ease both}
.hero h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(3rem,7vw,5.5rem);font-weight:700;line-height:1.08;max-width:900px;margin-bottom:24px;animation:slideUp .6s .1s ease both}
.hero h1 .grad{background:linear-gradient(135deg,var(--p3),var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:1.15rem;color:var(--muted);max-width:580px;line-height:1.75;margin-bottom:42px;animation:slideUp .6s .2s ease both}
.hero-ctas{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;animation:slideUp .6s .3s ease both;margin-bottom:56px}
.hero-feature-row{display:flex;gap:28px;justify-content:center;flex-wrap:wrap;animation:slideUp .6s .4s ease both}
.hf-pill{display:flex;align-items:center;gap:8px;font-size:.83rem;color:var(--muted)}
.hf-pill .dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,var(--p2),var(--cyan))}

/* STATS STRIP */
.stats-strip{background:linear-gradient(135deg,var(--p) 0%,#5b21b6 50%,#1e40af 100%);padding:52px 60px;display:flex;justify-content:center;gap:72px;flex-wrap:wrap;text-align:center;position:relative;z-index:1}
.stat-item .num{font-family:'Space Grotesk',sans-serif;font-size:2.8rem;font-weight:700;color:#fff;line-height:1}
.stat-item .lbl{font-size:.82rem;color:rgba(255,255,255,.7);margin-top:6px;font-weight:500}

/* HOW IT WORKS */
.section{padding:90px 60px;position:relative;z-index:1}
.section-label{font-size:.72rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--p2);margin-bottom:12px}
.section-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:700;line-height:1.2;margin-bottom:16px;color:var(--text)}
.section-sub{font-size:.97rem;color:var(--muted);max-width:560px;line-height:1.75}
.max-w{max-width:1120px;margin:0 auto}
.center{text-align:center}
.center .section-sub{margin:0 auto}

/* MODES GRID */
.modes-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:52px}
.mode-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:28px 22px;cursor:pointer;transition:all .28s;position:relative;overflow:hidden}
.mode-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--p),var(--cyan));opacity:0;transition:.3s}
.mode-card:hover::before{opacity:.06}
.mode-card:hover{border-color:var(--border2);transform:translateY(-5px);box-shadow:var(--glow)}
.mode-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(6,182,212,.1));border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:18px}
.mode-card h3{font-size:1rem;font-weight:700;margin-bottom:8px}
.mode-card p{font-size:.83rem;color:var(--muted);line-height:1.6}

/* HOW IT WORKS STEPS */
.steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;margin-top:52px}
.step-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:34px 28px;position:relative}
.step-num{font-size:4rem;font-weight:900;color:rgba(124,58,237,.12);position:absolute;top:18px;right:22px;font-family:'Space Grotesk',sans-serif;line-height:1}
.step-icon{font-size:2rem;margin-bottom:18px}
.step-card h3{font-size:1.05rem;font-weight:700;margin-bottom:10px}
.step-card p{font-size:.85rem;color:var(--muted);line-height:1.7}

/* UPLOAD DEMO */
.upload-split{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;margin-top:60px}
.upload-text h2{font-family:'Space Grotesk',sans-serif;font-size:2.2rem;font-weight:700;line-height:1.25;margin-bottom:18px}
.upload-text p{font-size:.93rem;color:var(--muted);line-height:1.75;margin-bottom:14px}
.upload-tags{display:flex;flex-wrap:wrap;gap:9px;margin-top:22px}
.upload-tag{padding:8px 18px;border-radius:50px;background:var(--surface);border:1px solid var(--border);font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s}
.upload-tag:hover{background:var(--p);color:#fff;border-color:var(--p)}
.upload-visual{background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);border:1px solid var(--border);border-radius:var(--r2);padding:32px;display:flex;flex-direction:column;gap:14px}
.up-item{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--surface3);border-radius:12px;border:1px solid var(--border);font-size:.87rem;font-weight:500;transition:all .2s}
.up-item:hover{border-color:var(--border2)}
.up-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.up-item .sub{font-size:.75rem;color:var(--muted);margin-top:2px}
.up-item .done{color:var(--green);font-size:.75rem;margin-left:auto;font-weight:700}

/* TESTIMONIALS */
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:52px}
.testi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:28px;transition:all .25s}
.testi-card:hover{border-color:var(--border2);box-shadow:var(--glow)}
.stars{color:var(--yellow);font-size:1.1rem;letter-spacing:2px;margin-bottom:14px}
.testi-quote{font-size:.9rem;color:var(--text);line-height:1.75;font-style:italic;margin-bottom:20px}
.testi-author{display:flex;align-items:center;gap:12px}
.tav{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--cyan));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.85rem;flex-shrink:0}
.tav-name{font-size:.88rem;font-weight:700}
.tav-loc{font-size:.75rem;color:var(--muted)}

/* CTA SECTION */
.cta-section{background:linear-gradient(135deg,var(--p) 0%,#5b21b6 100%);padding:90px 60px;text-align:center;position:relative;overflow:hidden;z-index:1}
.cta-section::before{content:'';position:absolute;top:-100px;left:-100px;width:500px;height:500px;background:rgba(255,255,255,.05);border-radius:50%;pointer-events:none}
.cta-section::after{content:'';position:absolute;bottom:-150px;right:-100px;width:600px;height:600px;background:rgba(6,182,212,.08);border-radius:50%;pointer-events:none}
.cta-section h2{font-family:'Space Grotesk',sans-serif;font-size:clamp(2rem,4vw,3.5rem);font-weight:700;color:#fff;margin-bottom:18px;position:relative;z-index:1}
.cta-section p{font-size:1rem;color:rgba(255,255,255,.8);max-width:520px;margin:0 auto 36px;line-height:1.75;position:relative;z-index:1}

/* LANG SCROLL */
.scroll-track-wrap{overflow:hidden;position:relative;padding:0}
.scroll-track-wrap::before,.scroll-track-wrap::after{content:'';position:absolute;top:0;bottom:0;width:120px;z-index:2;pointer-events:none}
.scroll-track-wrap::before{left:0;background:linear-gradient(to right,var(--bg),transparent)}
.scroll-track-wrap::after{right:0;background:linear-gradient(to left,var(--bg),transparent)}
.scroll-track{display:flex;gap:12px;animation:scrollX 25s linear infinite;width:max-content;padding:8px 0}
@keyframes scrollX{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.lang-chip{padding:9px 20px;background:var(--surface);border:1px solid var(--border);border-radius:50px;font-size:.82rem;font-weight:500;white-space:nowrap}

/* FOOTER */
footer{background:var(--surface);border-top:1px solid var(--border);padding:56px 60px 28px;position:relative;z-index:1}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;max-width:1120px;margin:0 auto 40px}
.footer-brand p{font-size:.83rem;color:var(--muted);line-height:1.75;max-width:220px;margin-top:14px}
.footer-col h4{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:16px}
.footer-col ul{list-style:none;display:flex;flex-direction:column;gap:10px}
.footer-col ul a{font-size:.85rem;color:var(--muted);text-decoration:none;cursor:pointer;transition:color .2s}
.footer-col ul a:hover{color:var(--p2)}
.footer-bottom{max-width:1120px;margin:0 auto;padding-top:20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
.footer-bottom p{font-size:.78rem;color:var(--muted)}

/* TOAST */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:14px 24px;font-size:.88rem;font-weight:700;z-index:9999;transition:transform .4s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--glow),0 20px 60px rgba(0,0,0,.7);display:flex;align-items:center;gap:8px;max-width:90vw}
#toast.show{transform:translateX(-50%) translateY(0)}
#badgeToast{position:fixed;top:80px;right:24px;background:var(--surface);border:2px solid var(--yellow);border-radius:var(--r);padding:18px 22px;z-index:9998;display:none;animation:badgePop .5s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 40px rgba(245,158,11,.4);max-width:260px}
.confetti-p{position:fixed;width:9px;height:9px;top:-10px;pointer-events:none;z-index:9997;border-radius:2px;animation:confetti linear forwards}

/* ═══ APP ═══ */
#app{display:none}
#appNav{position:sticky;top:0;z-index:100;background:rgba(4,4,13,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;gap:12px}
[data-theme=light] #appNav{background:rgba(245,245,255,.92)}
.app-brand{display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
.app-tabs{display:flex;gap:2px}
.app-tab{padding:7px 13px;border-radius:10px;border:none;background:transparent;color:var(--muted);font-size:.8rem;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:5px}
.app-tab:hover{color:var(--text);background:var(--surface2)}
.app-tab.active{color:var(--text);background:var(--surface2);border:1px solid var(--border)}
.app-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.streak-pill{display:flex;align-items:center;gap:5px;padding:5px 12px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);border-radius:50px;font-size:.78rem;font-weight:700;color:var(--yellow)}
.level-pill{display:flex;align-items:center;gap:5px;padding:5px 12px;background:rgba(124,58,237,.12);border:1px solid var(--border2);border-radius:50px;font-size:.78rem;font-weight:700;color:var(--p3)}
.user-chip{display:flex;align-items:center;gap:8px;padding:5px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:50px;cursor:pointer;transition:all .2s;font-size:.82rem}
.user-chip:hover{border-color:var(--p)}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--cyan));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.75rem;color:#fff;flex-shrink:0}

/* VIEWS */
.view{display:none;padding:28px 20px;max-width:1120px;margin:0 auto;animation:fadeIn .3s ease}
.view.active{display:block}

/* OVERLAY / AUTH */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(20px);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .25s ease}
.overlay.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r3);padding:40px;width:90%;max-width:460px;animation:pop .4s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--glow),0 50px 100px rgba(0,0,0,.8);max-height:90vh;overflow-y:auto}
.modal-brand{text-align:center;margin-bottom:26px}
.modal-brand .logo{font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--p3),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.modal-brand .sub{font-size:.8rem;color:var(--muted);margin-top:4px}
.tab-row{display:flex;gap:4px;background:var(--surface2);border-radius:12px;padding:4px;margin-bottom:26px}
.tab-btn{flex:1;padding:10px;border:none;border-radius:9px;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;background:transparent;color:var(--muted)}
.tab-btn.active{background:var(--p);color:#fff;box-shadow:0 4px 16px rgba(124,58,237,.4)}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:.8rem;font-weight:700;color:var(--muted);margin-bottom:7px}
.fg input,.fg select,.fg textarea{width:100%;padding:13px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:.9rem;transition:all .2s;outline:none;font-family:'Inter',sans-serif}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.fg select option{background:var(--surface2)}
.fg textarea{resize:vertical;min-height:100px;line-height:1.6}
.err{color:var(--red);font-size:.78rem;margin-top:6px;display:none}
.err.show{display:block;animation:shake .3s ease}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0}
.divider hr{flex:1;border:none;border-top:1px solid var(--border)}
.divider span{color:var(--muted);font-size:.76rem}

/* DASHBOARD */
.greeting{font-family:'Space Grotesk',sans-serif;font-size:1.9rem;font-weight:700;margin-bottom:4px;line-height:1.2}
.greeting .g{background:linear-gradient(135deg,var(--p3),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub-greet{color:var(--muted);margin-bottom:28px;font-size:.9rem;line-height:1.6}
.xp-container{margin-bottom:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px}
.xp-row{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:8px}
.xp-bar{background:var(--surface3);border-radius:50px;height:8px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--cyan));border-radius:50px;transition:width .8s ease}
.ai-pill{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;font-size:.82rem;margin-bottom:22px;border:1px solid}
.ai-pill.ready{background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.2)}
.ai-pill.loading{background:rgba(245,158,11,.07);border-color:rgba(245,158,11,.2);animation:pulse-glow 2s infinite}
.ai-pill.error{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.2)}
.ai-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ai-dot.green{background:var(--green);box-shadow:0 0 8px var(--green)}
.ai-dot.yellow{background:var(--yellow);box-shadow:0 0 8px var(--yellow);animation:stream 1s infinite}
.ai-dot.red{background:var(--red)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;cursor:default;transition:all .22s}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--p),var(--cyan))}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.stat-icon{font-size:1.5rem;margin-bottom:8px}
.stat-val{font-size:1.65rem;font-weight:900;line-height:1}
.stat-lbl{color:var(--muted);font-size:.74rem;margin-top:4px}
.action-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px;margin-bottom:28px}
.action-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:24px;cursor:pointer;transition:all .25s;text-align:center;position:relative;overflow:hidden}
.action-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--p),var(--cyan));opacity:0;transition:.3s}
.action-card:hover::before{opacity:.07}
.action-card:hover{border-color:var(--border2);transform:translateY(-4px);box-shadow:var(--glow)}
.action-card .ico{font-size:2rem;margin-bottom:12px;display:block}
.action-card h3{font-size:.92rem;font-weight:700;margin-bottom:5px}
.action-card p{font-size:.78rem;color:var(--muted);line-height:1.5}

/* DECKS */
.decks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.deck-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r2);padding:22px;transition:all .25s;position:relative;overflow:hidden}
.deck-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--p),var(--cyan));transform:scaleX(0);transform-origin:left;transition:.3s}
.deck-card:hover::after{transform:scaleX(1)}
.deck-card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:var(--glow)}
.deck-subject-tag{display:inline-block;padding:4px 12px;border-radius:50px;font-size:.72rem;font-weight:800;background:rgba(124,58,237,.1);color:var(--p3);border:1px solid rgba(124,58,237,.2);margin-bottom:10px}
.deck-card h3{font-size:1.05rem;font-weight:800;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.deck-meta{color:var(--muted);font-size:.78rem;margin-bottom:14px}
.progress-wrap{background:var(--surface2);border-radius:50px;height:5px;margin-bottom:10px;overflow:hidden}
.progress-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--p),var(--cyan));transition:width .6s ease}
.deck-btns{display:flex;gap:6px;flex-wrap:wrap}
.deck-btns button{flex:1;min-width:50px;padding:8px 4px;border-radius:9px;border:none;font-size:.74rem;font-weight:800;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.db-study{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff}
.db-quiz{background:linear-gradient(135deg,#0891b2,var(--cyan));color:#fff}
.db-timed{background:linear-gradient(135deg,#be185d,var(--pink));color:#fff}
.db-type{background:linear-gradient(135deg,#059669,var(--green));color:#fff}
.db-match{background:linear-gradient(135deg,#d97706,var(--yellow));color:#fff}
.db-del{background:rgba(239,68,68,.08);color:var(--red);border:1px solid rgba(239,68,68,.15)!important}
.db-del:hover{background:var(--red)!important;color:#fff!important}
.search-box{position:relative;margin-bottom:20px}
.search-box input{width:100%;padding:12px 16px 12px 44px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:.9rem;outline:none;transition:all .2s;font-family:'Inter',sans-serif}
.search-box input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(124,58,237,.12)}
.search-box .si{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem}

/* CREATE */
.create-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:28px;margin-bottom:22px}
.ai-area{background:var(--surface2);border:1.5px solid var(--p);border-radius:var(--r);padding:24px;position:relative;margin-bottom:18px}
.ai-area::before{content:'🧠 AI POWERED';position:absolute;top:-11px;left:18px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;font-size:.62rem;font-weight:900;padding:3px 14px;border-radius:50px;letter-spacing:1px}
.card-preview{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;gap:12px;align-items:flex-start;margin-bottom:10px;transition:border-color .2s}
.card-preview:hover{border-color:var(--border2)}
.card-num{min-width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--p),var(--p2));display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900;flex-shrink:0;color:#fff}
.card-qa{flex:1;min-width:0}
.card-qa .q{font-weight:700;font-size:.87rem;margin-bottom:5px;word-break:break-word}
.card-qa .a{color:var(--muted);font-size:.82rem;line-height:1.5;word-break:break-word}
.card-qa .tip{font-size:.74rem;color:var(--p3);margin-top:5px;font-style:italic}
.del-c{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:4px;transition:color .2s;flex-shrink:0}
.del-c:hover{color:var(--red)}

/* STUDY */
#studyView{text-align:center}
.study-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:14px;flex-wrap:wrap}
.study-prog-wrap{flex:1;min-width:180px}
.prog-labels{display:flex;justify-content:space-between;font-size:.76rem;color:var(--muted);margin-bottom:7px}
.study-bar{background:var(--surface2);border-radius:50px;height:7px;overflow:hidden}
.study-bar-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--cyan));border-radius:50px;transition:width .5s ease}
.flashcard-3d{perspective:1200px;width:100%;max-width:700px;height:340px;margin:0 auto 28px;cursor:pointer;user-select:none}
.fc-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .65s cubic-bezier(.34,1.56,.64,1)}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:38px;backface-visibility:hidden;border:1px solid var(--border)}
.fc-front{background:linear-gradient(145deg,var(--surface),var(--surface2));box-shadow:0 24px 60px rgba(0,0,0,.5),var(--glow)}
.fc-back{background:linear-gradient(145deg,rgba(124,58,237,.1),rgba(6,182,212,.07));transform:rotateY(180deg);border-color:var(--border2)}
.fc-label{font-size:.68rem;font-weight:800;letter-spacing:2px;color:var(--muted);margin-bottom:14px;text-transform:uppercase}
.fc-text{font-size:1.3rem;font-weight:700;line-height:1.65;max-width:100%;word-break:break-word}
.fc-tip{font-size:.82rem;color:var(--p3);background:rgba(124,58,237,.08);padding:10px 16px;border-radius:10px;margin-top:14px;border:1px solid rgba(124,58,237,.2);font-style:italic;width:100%;text-align:left}
.fc-hint{font-size:.82rem;color:var(--yellow);background:rgba(245,158,11,.09);padding:10px 16px;border-radius:10px;margin-top:12px;border:1px solid rgba(245,158,11,.2);text-align:left;animation:pop .3s ease;width:100%}
.fc-click-hint{font-size:.76rem;color:var(--muted2);margin-top:14px}
.rating-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.rate-btn{padding:12px 24px;border-radius:12px;border:none;font-weight:900;font-size:.85rem;cursor:pointer;transition:all .22s;font-family:'Inter',sans-serif}
.rate-btn:hover{transform:translateY(-2px)}
.r-again{background:rgba(239,68,68,.1);color:var(--red);border:1.5px solid rgba(239,68,68,.2)}
.r-again:hover{background:var(--red);color:#fff;box-shadow:0 6px 20px rgba(239,68,68,.4)}
.r-hard{background:rgba(245,158,11,.1);color:var(--yellow);border:1.5px solid rgba(245,158,11,.2)}
.r-hard:hover{background:var(--yellow);color:#000;box-shadow:0 6px 20px rgba(245,158,11,.4)}
.r-good{background:rgba(16,185,129,.1);color:var(--green);border:1.5px solid rgba(16,185,129,.2)}
.r-good:hover{background:var(--green);color:#fff;box-shadow:0 6px 20px rgba(16,185,129,.4)}
.r-easy{background:rgba(6,182,212,.1);color:var(--cyan);border:1.5px solid rgba(6,182,212,.2)}
.r-easy:hover{background:var(--cyan);color:#fff;box-shadow:0 6px 20px rgba(6,182,212,.4)}
.reveal-btn{padding:16px 52px;border-radius:60px;border:none;font-size:.98rem;font-weight:900;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;cursor:pointer;box-shadow:0 8px 32px rgba(124,58,237,.55);transition:all .25s;letter-spacing:.5px;animation:pulse-glow 2.5s infinite;margin-bottom:20px}
.reveal-btn:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 16px 48px rgba(124,58,237,.75)}
.ai-explain-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;border:1px solid rgba(168,85,247,.3);background:rgba(124,58,237,.08);color:var(--p3);font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px}
.ai-explain-btn:hover{background:rgba(124,58,237,.2)}
.hint-btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border-radius:10px;border:1px solid rgba(245,158,11,.25);background:rgba(245,158,11,.07);color:var(--yellow);font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px;margin-left:8px}
.hint-btn:hover{background:rgba(245,158,11,.18)}
.explain-panel{background:rgba(124,58,237,.07);border:1px solid rgba(124,58,237,.22);border-radius:12px;padding:18px;margin-top:14px;font-size:.86rem;line-height:1.7;text-align:left;max-width:640px;margin-left:auto;margin-right:auto}
.type-wrap{margin:20px auto;max-width:600px}
.type-wrap input{width:100%;padding:16px 20px;background:var(--surface2);border:2px solid var(--border);border-radius:14px;color:var(--text);font-size:1.1rem;text-align:center;outline:none;transition:all .2s;font-family:'Inter',sans-serif}
.type-wrap input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.type-wrap input.ok{border-color:var(--green);background:rgba(16,185,129,.06)}
.type-wrap input.no{border-color:var(--red);background:rgba(239,68,68,.06)}
.quiz-opt{width:100%;padding:15px 20px;text-align:left;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:.92rem;font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:9px;display:flex;align-items:center;gap:12px;font-family:'Inter',sans-serif}
.quiz-opt:hover:not(:disabled){border-color:var(--p);background:rgba(124,58,237,.08)}
.quiz-opt.correct{border-color:var(--green)!important;background:rgba(16,185,129,.12)!important;color:var(--green)!important}
.quiz-opt.wrong{border-color:var(--red)!important;background:rgba(239,68,68,.1)!important;color:var(--red)!important}
.ql{width:28px;height:28px;border-radius:8px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:900;flex-shrink:0}
.match-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px;max-width:840px;margin:0 auto}
.match-card{padding:18px 12px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:.82rem;font-weight:700;cursor:pointer;transition:all .22s;text-align:center;word-break:break-word;min-height:80px;display:flex;align-items:center;justify-content:center;line-height:1.4}
.match-card.sel{border-color:var(--p);background:rgba(124,58,237,.18);box-shadow:var(--glow);transform:scale(1.04)}
.match-card.matched{border-color:var(--green);background:rgba(16,185,129,.12);color:var(--green);pointer-events:none}
.match-card.bad{border-color:var(--red);background:rgba(239,68,68,.1);animation:shake .3s ease}
.timed-bar{background:var(--surface2);border-radius:50px;height:8px;overflow:hidden;margin-bottom:12px;max-width:700px;margin-left:auto;margin-right:auto}
.timed-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));transition:width .1s linear}
.timed-num{font-size:1.5rem;font-weight:900;color:var(--yellow);min-width:50px;text-align:center}
.session-end{text-align:center;padding:52px 36px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2)}
.session-end .big{font-size:4.5rem;margin-bottom:18px;animation:float 2s ease-in-out infinite}
.session-end h2{font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:700;margin-bottom:8px}
.score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:22px 0}
.score-box{background:var(--surface2);border-radius:12px;padding:14px;border:1px solid var(--border)}
.score-box .v{font-size:1.5rem;font-weight:900}
.score-box .l{font-size:.72rem;color:var(--muted);margin-top:3px}

/* AI CHAT */
.chat-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;height:580px;display:flex;flex-direction:column}
.chat-hd{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:var(--surface2)}
.ai-av{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--p),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:var(--glow);flex-shrink:0}
.ai-online{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:stream 1.5s infinite;display:inline-block}
.chat-msgs{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:14px}
.msg{max-width:84%;animation:slideUp .3s ease}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end}
.msg-bub{padding:14px 18px;border-radius:14px;font-size:.88rem;line-height:1.7;word-break:break-word}
.msg.ai .msg-bub{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.user .msg-bub{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border-bottom-right-radius:4px}
.stream-cur::after{content:'▋';animation:stream .7s infinite;color:var(--p2)}
.msg-time{font-size:.68rem;color:var(--muted2);margin-top:4px;padding:0 4px}
.typing{display:flex;gap:5px;padding:13px 17px;background:var(--surface2);border-radius:14px;border-bottom-left-radius:4px;border:1px solid var(--border);width:fit-content}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:typing 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
.chips-row{display:flex;flex-wrap:wrap;gap:7px;padding:10px 20px;border-top:1px solid var(--border)}
.chip{padding:6px 14px;border-radius:50px;font-size:.74rem;font-weight:700;background:rgba(124,58,237,.08);color:var(--p3);border:1px solid rgba(124,58,237,.18);cursor:pointer;transition:all .18s;white-space:nowrap}
.chip:hover{background:rgba(124,58,237,.25);border-color:var(--p);transform:translateY(-1px)}
.chat-in-row{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px}
.chat-in-row input{flex:1;padding:12px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:.88rem;outline:none;transition:all .2s;font-family:'Inter',sans-serif}
.chat-in-row input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(124,58,237,.12)}
.send-btn{padding:12px 18px;background:linear-gradient(135deg,var(--p),var(--p2));border:none;border-radius:12px;color:#fff;font-size:1.1rem;cursor:pointer;transition:all .2s}
.send-btn:hover{box-shadow:var(--glow);transform:scale(1.06)}

/* ANALYTICS */
.analytics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;margin-bottom:22px}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px}
.chart-box h4{font-weight:800;margin-bottom:18px;font-size:.95rem}
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px;margin-top:18px}
.ach-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;text-align:center;transition:all .2s}
.ach-card.earned{border-color:var(--yellow);background:rgba(245,158,11,.05);box-shadow:0 0 24px rgba(245,158,11,.15)}
.ach-card:not(.earned){filter:grayscale(.8);opacity:.4}
.ach-icon{font-size:2.2rem;margin-bottom:8px}
.ach-name{font-size:.82rem;font-weight:800;margin-bottom:3px}
.ach-desc{font-size:.7rem;color:var(--muted)}
.weak-item{background:var(--surface2);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:13px 16px;font-size:.83rem;margin-bottom:8px}
.weak-item .wq{font-weight:700;margin-bottom:4px}
.weak-item .wp{font-size:.72rem;color:var(--red)}

/* STREAK CAL */
.streak-cal{display:flex;flex-wrap:wrap;gap:4px;margin-top:12px}
.s-day{width:14px;height:14px;border-radius:3px;background:var(--surface3)}
.s-day.s1{background:rgba(124,58,237,.3)}
.s-day.s2{background:rgba(124,58,237,.6)}
.s-day.s3{background:rgba(168,85,247,.85)}
.s-day.today{outline:2px solid var(--cyan);outline-offset:1px}

/* SETTINGS */
.set-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:16px}
.set-section h3{font-size:.76rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.set-row:last-child{border-bottom:none}
.set-info h4{font-size:.88rem;font-weight:700;margin-bottom:2px}
.set-info p{font-size:.77rem;color:var(--muted)}
.toggle{width:46px;height:25px;background:var(--border);border-radius:50px;position:relative;cursor:pointer;transition:.3s;border:none;flex-shrink:0}
.toggle::after{content:'';position:absolute;width:19px;height:19px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle.on{background:var(--p)}
.toggle.on::after{left:24px}

/* STUDY GUIDE */
.study-guide-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:36px;max-width:800px;margin:0 auto}
.guide-section{margin-bottom:28px}
.guide-section h3{font-size:1.05rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.guide-section p{font-size:.88rem;color:var(--muted);line-height:1.8}
.guide-section ul{margin-left:20px;display:flex;flex-direction:column;gap:8px}
.guide-section ul li{font-size:.88rem;color:var(--muted);line-height:1.7}
.key-term{display:inline-flex;align-items:center;padding:3px 10px;background:rgba(124,58,237,.1);border-radius:6px;font-weight:700;color:var(--p3);font-size:.8rem;margin:3px;border:1px solid rgba(124,58,237,.2)}

/* MISC */
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:spin 1s linear infinite;margin:24px auto}
.empty{text-align:center;padding:52px 20px}
.empty .ei{font-size:3.5rem;margin-bottom:16px}
.badge-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 12px;border-radius:50px;font-size:.72rem;font-weight:800}
.badge-p{background:rgba(124,58,237,.12);color:var(--p3);border:1px solid rgba(124,58,237,.2)}
.badge-g{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.badge-y{background:rgba(245,158,11,.12);color:var(--yellow);border:1px solid rgba(245,158,11,.2)}
.pomo-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;display:flex;align-items:center;gap:16px;margin-bottom:20px;max-width:700px;margin-left:auto;margin-right:auto}
.pomo-time{font-size:1.7rem;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:2px;min-width:70px}
.pomo-time.work{color:var(--p3)}
.pomo-time.brk{color:var(--green)}
.pomo-lbl{font-size:.73rem;color:var(--muted);margin-top:2px}
.daily-card{background:linear-gradient(135deg,rgba(236,72,153,.07),rgba(245,158,11,.05));border:1.5px solid rgba(236,72,153,.25);border-radius:var(--r);padding:22px;margin-bottom:22px;position:relative;overflow:hidden;display:none}
.daily-card::before{content:'⚡ DAILY CHALLENGE';position:absolute;top:-11px;left:18px;background:linear-gradient(135deg,var(--pink),var(--yellow));color:#fff;font-size:.62rem;font-weight:900;padding:3px 14px;border-radius:50px;letter-spacing:1px}


/* ── PRICING ── */
.pricing-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;margin-top:52px;max-width:1000px;margin-left:auto;margin-right:auto}
.price-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r2);padding:32px 26px;position:relative;transition:all .3s;display:flex;flex-direction:column}
.price-card.popular{border-color:var(--p);box-shadow:var(--glow),0 0 0 1px var(--p)}
.price-card.elite{border-color:var(--yellow);box-shadow:0 0 40px rgba(245,158,11,.2),0 0 0 1px var(--yellow)}
.price-badge{position:absolute;top:-13px;left:50%;transform:translateX(-50%);padding:4px 18px;border-radius:50px;font-size:.7rem;font-weight:900;letter-spacing:1px;white-space:nowrap}
.price-badge.pop{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff}
.price-badge.hot{background:linear-gradient(135deg,var(--yellow),#f97316);color:#000}
.price-tier{font-size:.72rem;font-weight:900;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
.price-tier.free{color:var(--muted)}
.price-tier.pro{color:var(--p2)}
.price-tier.elite{color:var(--yellow)}
.price-name{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;margin-bottom:4px}
.price-tagline{font-size:.8rem;color:var(--muted);margin-bottom:20px;line-height:1.5}
.price-amount{font-family:'Space Grotesk',sans-serif;font-size:2.8rem;font-weight:700;line-height:1;margin-bottom:4px}
.price-amount span{font-size:1rem;font-weight:400;color:var(--muted)}
.price-per{font-size:.75rem;color:var(--muted2);margin-bottom:24px}
.price-features{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:28px;flex:1}
.price-features li{display:flex;align-items:flex-start;gap:9px;font-size:.84rem;line-height:1.5}
.price-features li .pfi{flex-shrink:0;font-size:.9rem;margin-top:1px}
.price-features li.no{color:var(--muted2);text-decoration:line-through;opacity:.5}
.price-cta{width:100%;padding:14px;border:none;border-radius:12px;font-size:.92rem;font-weight:900;cursor:pointer;transition:all .22s;font-family:'Inter',sans-serif}
.price-cta.free{background:var(--surface2);color:var(--text);border:1.5px solid var(--border)}
.price-cta.free:hover{border-color:var(--p);color:var(--p)}
.price-cta.pro{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;box-shadow:0 6px 24px rgba(124,58,237,.4)}
.price-cta.pro:hover{box-shadow:0 10px 36px rgba(124,58,237,.65);transform:translateY(-2px)}
.price-cta.elite{background:linear-gradient(135deg,#d97706,var(--yellow));color:#000;box-shadow:0 6px 24px rgba(245,158,11,.4)}
.price-cta.elite:hover{box-shadow:0 10px 36px rgba(245,158,11,.65);transform:translateY(-2px)}
@media(max-width:900px){.pricing-grid{grid-template-columns:1fr}}

/* UPGRADE MODAL */
.upgrade-modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r3);padding:36px;width:90%;max-width:440px;animation:pop .4s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--glow),0 50px 100px rgba(0,0,0,.8);text-align:center}
.tier-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:50px;font-size:.75rem;font-weight:800}
.tier-pill.free{background:rgba(100,100,120,.15);color:var(--muted);border:1px solid var(--border)}
.tier-pill.pro{background:rgba(124,58,237,.15);color:var(--p3);border:1px solid rgba(124,58,237,.3)}
.tier-pill.elite{background:rgba(245,158,11,.15);color:var(--yellow);border:1px solid rgba(245,158,11,.3)}
.wall-icon{font-size:3.5rem;margin-bottom:14px;display:block;animation:float 2s ease-in-out infinite}

/* SHORTCUT OVERLAY */
#shortcuts{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(20px);z-index:2000;display:flex;align-items:center;justify-content:center}
#shortcuts.hidden{display:none}
.short-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:34px;max-width:500px;width:90%;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
.short-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.short-row:last-child{border-bottom:none}
.short-row kbd{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:.8rem;font-family:monospace;color:var(--p3)}
.short-row span{font-size:.85rem;color:var(--muted)}

/* IMPORT CSV */
.drop-area{border:2px dashed var(--border2);border-radius:14px;padding:32px;text-align:center;cursor:pointer;transition:.2s;background:var(--surface2)}
.drop-area:hover,.drop-area.drag-over{border-color:var(--p);background:rgba(124,58,237,.05)}

@media(max-width:900px){
  .land-nav{padding:0 20px}.land-nav ul{display:none}
  .hero{padding:100px 24px 60px}.section{padding:60px 24px}
  .upload-split,.steps-grid{grid-template-columns:1fr}
  .modes-grid{grid-template-columns:repeat(2,1fr)}
  .testi-grid{grid-template-columns:1fr}
  .stats-strip{padding:40px 24px;gap:40px}
  .footer-grid{grid-template-columns:1fr 1fr}
  .cta-section{padding:60px 24px}
  .score-grid{grid-template-columns:repeat(2,1fr)}
  .app-tabs{display:none}
}
@media(max-width:600px){
  .modes-grid{grid-template-columns:1fr 1fr}
  .hero h1{font-size:2.4rem}
}
